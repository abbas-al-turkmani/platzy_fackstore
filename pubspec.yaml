name: platzy_fackstore
description: "A fack store."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.5.3

dependencies:
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8
  dartz: ^0.10.1
  dio: ^5.7.0
  easy_localization: ^3.0.7
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_dotenv: ^6.0.0
  flutter_env_native: ^0.2.0
  flutter_gen: ^5.10.0
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.0.14
  freezed: ^3.2.3
  get_it: ^9.2.1
  go_router: ^17.1.0
  http: ^1.2.2
  iconsax: ^0.0.8
  iconsax_plus: null
  pretty_dio_logger: ^1.4.0
  shared_preferences: ^2.5.3
  shared_preferences_helper: ^0.0.3
  theme_tailor_annotation: ^3.0.2

dev_dependencies:
  build_runner: ^2.4.15
  flutter_gen_runner: ^5.10.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  theme_tailor: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/images/pngs/
    - assets/images/products/
    - assets/images/catigories/
    - assets/images/catigories/hoddies/
    - assets/translations/
    - assets/env/api_links.env

  fonts:
    - family: Circular Std
      fonts:
        - asset: assets\fonts\Circular Std Font.ttf
    - family: Gabarito
      fonts:
        - asset: assets\fonts\Gabarito.ttf
